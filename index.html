<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#fff7d6" />
    <title>贴贴消消乐</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="phone-game" aria-label="贴贴消消乐">
      <section class="stage">
        <header class="hud">
          <button id="pauseBtn" class="round-button pause" type="button" aria-label="暂停">
            <span></span>
            <span></span>
          </button>

          <div class="progress-wrap" aria-label="清空进度">
            <div id="progressBar" class="progress-bar"></div>
            <div id="progressPet" class="progress-pet"></div>
          </div>

          <div class="score-pill" aria-label="当前分数">
            <span id="score">0</span>
            <i></i>
          </div>
        </header>

        <section class="board-zone">
          <div id="banner" class="banner" aria-live="assertive"></div>
          <div id="board" class="board" aria-label="消除棋盘"></div>
          <div id="hand" class="hand hidden" aria-hidden="true"></div>
        </section>

        <footer class="tool-row" aria-label="道具">
          <button id="hintBtn" class="tool-button" type="button" aria-label="提示">
            <span class="tool-icon magnifier"></span>
            <b id="hintCount">3</b>
          </button>
          <button id="bombBtn" class="tool-button" type="button" aria-label="炸弹">
            <span class="tool-icon bomb"></span>
            <b id="bombCount">2</b>
          </button>
          <button id="shuffleBtn" class="tool-button" type="button" aria-label="洗牌">
            <span class="tool-icon shuffle"></span>
            <b id="shuffleCount">2</b>
          </button>
          <button id="soundBtn" class="sound-button on" type="button" aria-label="声音开关">♪</button>
        </footer>

        <section id="winPanel" class="win-panel hidden" aria-live="assertive">
          <div class="win-pet">
            <span class="crown"></span>
            <span class="sparkle s1"></span>
            <span class="sparkle s2"></span>
          </div>
          <p>win</p>
          <button id="nextBtn" class="play-button" type="button">下一关</button>
        </section>

        <section id="pausePanel" class="pause-panel hidden">
          <div class="pause-box">
            <h1>贴贴消消乐</h1>
            <p>点相邻同款贴纸，清空整张小卡。</p>
            <button id="resumeBtn" class="play-button" type="button">继续</button>
            <button id="restartBtn" class="quiet-button" type="button">重来</button>
          </div>
        </section>
      </section>
    </main>

    <script src="./game.js"></script>
  </body>
</html>
