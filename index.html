<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#fff7d6" />
    <title>萌宠消消乐</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="phone-game" aria-label="萌宠消消乐">
      <section class="stage">
        <header class="topbar">
          <button id="pauseBtn" class="round-button pause" type="button" aria-label="暂停">
            <span></span>
            <span></span>
          </button>

          <div class="level-card">
            <strong id="levelLabel">Level 1</strong>
            <span id="goalText">收集萌宠</span>
          </div>

          <button id="soundBtn" class="round-button sound on" type="button" aria-label="声音开关">♪</button>
        </header>

        <section class="goal-panel" aria-label="关卡目标">
          <div class="stat-pill">
            <span>步数</span>
            <strong id="moves">24</strong>
          </div>
          <div id="goals" class="goals"></div>
          <div class="stat-pill score">
            <span>分数</span>
            <strong id="score">0</strong>
          </div>
        </section>

        <section class="board-zone">
          <div id="banner" class="banner" aria-live="assertive"></div>
          <div id="board" class="board" aria-label="消除棋盘"></div>
          <div id="hand" class="hand hidden" aria-hidden="true"></div>
        </section>

        <footer class="tool-row" aria-label="道具">
          <button id="hintBtn" class="tool-button" type="button" aria-label="提示">
            <span class="tool-icon magnifier"></span>
            <b id="hintCount">3</b>
          </button>
          <button id="hammerBtn" class="tool-button" type="button" aria-label="小锤">
            <span class="tool-icon hammer"></span>
            <b id="hammerCount">2</b>
          </button>
          <button id="shuffleBtn" class="tool-button" type="button" aria-label="洗牌">
            <span class="tool-icon shuffle"></span>
            <b id="shuffleCount">2</b>
          </button>
        </footer>

        <section id="resultPanel" class="result-panel hidden" aria-live="assertive">
          <div class="result-box">
            <div class="win-pet" id="resultPet"></div>
            <h1 id="resultTitle">win</h1>
            <p id="resultCopy">萌宠们都到齐啦。</p>
            <button id="nextBtn" class="play-button" type="button">下一关</button>
            <button id="restartBtn" class="quiet-button" type="button">重玩本关</button>
          </div>
        </section>

        <section id="pausePanel" class="pause-panel hidden">
          <div class="pause-box">
            <h1>萌宠消消乐</h1>
            <p>交换相邻萌宠，凑齐横向或纵向三个以上就会消除。</p>
            <button id="resumeBtn" class="play-button" type="button">继续</button>
            <button id="pauseRestartBtn" class="quiet-button" type="button">重来</button>
          </div>
        </section>
      </section>
    </main>

    <script src="./game.js"></script>
  </body>
</html>
